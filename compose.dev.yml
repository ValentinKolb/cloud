# Dev containers — run with:
#   bun run dev          (core set, 5 containers)
#   bun run dev:full     (core + extras, 21 containers; --profile extra)
#   bun run dev:app FOO  (ad-hoc: start a single extra app in the running stack)
#
# Requires infra running: bun run infra
#
# Gateway replaces Traefik — routes are discovered dynamically from the Redis
# app registry, so ad-hoc containers joining the same docker network (= same
# compose project name = folder name "cloud") are picked up automatically.

x-env: &env
  NODE_ENV: development
  DATABASE_URL: postgresql://ipa:ipa@ipa_postgres:5432/ipa
  REDIS_URL: redis://ipa_valkey:6379
  APP_SECRET: dev-secret-change-me-in-production

x-app: &app
  build:
    context: .
    dockerfile: Dockerfile.dev
  working_dir: /app
  restart: unless-stopped

services:
  # ══════════════════════════════════════════════════════════════════
  # Core set — started by `bun run dev`
  # ══════════════════════════════════════════════════════════════════

  gateway:
    <<: *app
    container_name: gateway
    environment: { <<: *env, APP_ID: gateway }
    ports:
      - "3000:3000"
    volumes:
      - ./packages/cloud/src:/app/packages/cloud/src
      - ./packages/cloud/scripts:/app/packages/cloud/scripts
      - ./packages/gateway/src:/app/packages/gateway/src
      - ./styles.css:/app/styles.css
    command: bun run --preload=/app/packages/cloud/scripts/preload.ts --watch packages/gateway/src/index.ts

  app-gateway-ops:
    <<: *app
    container_name: app-gateway-ops
    environment: { <<: *env, APP_ID: gateway-ops }
    volumes:
      - ./packages/cloud/src:/app/packages/cloud/src
      - ./packages/cloud/scripts:/app/packages/cloud/scripts
      - ./packages/gateway/src:/app/packages/gateway/src
      - ./packages/gateway-ops/src:/app/packages/gateway-ops/src
      - ./styles.css:/app/styles.css
    command: bun run --preload=/app/packages/cloud/scripts/preload.ts --watch packages/gateway-ops/src/index.ts

  app-core:
    <<: *app
    container_name: app-core
    environment: { <<: *env, APP_ID: core, ADMIN_LOGIN_TOKEN: dev-admin }
    volumes:
      - ./packages/cloud/src:/app/packages/cloud/src
      - ./packages/cloud/scripts:/app/packages/cloud/scripts
      - ./packages/cloud/public:/app/packages/cloud/public
      - ./packages/core/src:/app/packages/core/src
      - ./styles.css:/app/styles.css
    command: bun run --preload=/app/packages/cloud/scripts/preload.ts --watch packages/core/src/index.ts

  app-dashboard:
    <<: *app
    container_name: app-dashboard
    environment: { <<: *env, APP_ID: dashboard }
    volumes:
      - ./packages/cloud/src:/app/packages/cloud/src
      - ./packages/cloud/scripts:/app/packages/cloud/scripts
      - ./packages/dashboard/src:/app/packages/dashboard/src
      - ./styles.css:/app/styles.css
    command: bun run --preload=/app/packages/cloud/scripts/preload.ts --watch packages/dashboard/src/index.ts

  app-accounts:
    <<: *app
    container_name: app-accounts
    environment: { <<: *env, APP_ID: accounts }
    volumes:
      - ./packages/cloud/src:/app/packages/cloud/src
      - ./packages/cloud/scripts:/app/packages/cloud/scripts
      - ./packages/accounts/src:/app/packages/accounts/src
      - ./styles.css:/app/styles.css
    command: bun run --preload=/app/packages/cloud/scripts/preload.ts --watch packages/accounts/src/index.ts

  # ══════════════════════════════════════════════════════════════════
  # Extras — only started with `--profile extra` or ad-hoc via dev:app
  # ══════════════════════════════════════════════════════════════════

  app-notebooks:
